name: copilot-post-fix-summary

# ──────────────────────────────────────────────────────────────
# Triggers when CI PASSES on a Dependabot branch.
# If Copilot made fix attempts on that PR, this workflow collects
# all attempt data and posts a structured fix summary comment.
#
# Use case: experiment tracking for gem upgrades — know exactly
# what broke, what Copilot tried, what worked, and how many
# attempts it took.
# ──────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches:
      - 'dependabot/**'

permissions: {}

env:
  COPILOT_MARKER: "<!-- copilot-fix-attempt-v2 -->"
  CONTROLLER_STATE_MARKER: "<!-- copilot-controller-state -->"
  COPILOT_PROGRESS_MARKER: "<!-- copilot-fix-progress -->"
  SUMMARY_MARKER: "<!-- copilot-fix-summary -->"

concurrency:
  group: copilot-summary-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  post-summary:
    # Runs on any completed CI (success or failure) for Dependabot PR branches
    if: >-
      (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure') &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── Step 1: Resolve the PR number ─────────────────────────
      - name: Resolve PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh api "repos/${REPO}/pulls" \
            --method GET \
            -f head="${REPO%%/*}:${BRANCH}" \
            -f state=open \
            --jq '.[0].number // empty')

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "⚠️  No open PR found for branch ${BRANCH}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Found PR #${PR_NUMBER}"

      # ── Step 2: Check if Copilot was involved ─────────────────
      - name: Check for Copilot fix attempts
        if: steps.find_pr.outputs.skip != 'true'
        id: check_copilot
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          # Count Copilot trigger comments
          RAW_COUNT=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | startswith(\"${COPILOT_MARKER}\"))] | length" \
            | paste -sd+ -)
          ATTEMPT_COUNT=$(( ${RAW_COUNT:-0} ))

          if [[ "${ATTEMPT_COUNT}" -eq 0 ]]; then
            echo "ℹ️  No Copilot fix attempts found on PR #${PR_NUMBER}. Skipping summary."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "attempt_count=${ATTEMPT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "📊 Found ${ATTEMPT_COUNT} Copilot fix attempt(s) on PR #${PR_NUMBER}"

      # ── Step 4: Gather all fix attempt data ───────────────────
      - name: Gather fix data
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_copilot.outputs.skip != 'true'
        id: gather
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          # ── 4a: Fetch PR metadata ──
          PR_DATA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          PR_TITLE=$(echo "${PR_DATA}" | jq -r '.title')
          PR_URL=$(echo "${PR_DATA}" | jq -r '.html_url')
          PR_AUTHOR=$(echo "${PR_DATA}" | jq -r '.user.login')

          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

          # Expose run conclusion
          echo "run_conclusion=${{ github.event.workflow_run.conclusion }}" >> "$GITHUB_OUTPUT"

          # ── 4b: Fetch controller state (final metrics) ──
          STATE_BODY=$(
            gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${CONTROLLER_STATE_MARKER}\"))] | last // empty | .body" \
            || echo ''
          )

          STATE_JSON=""
          if [[ -n "${STATE_BODY:-}" ]]; then
            STATE_JSON=$(echo "${STATE_BODY}" | sed -n '/```json/,/```/{/```/d;p}' || echo '')
          fi

          if [[ -n "${STATE_JSON:-}" ]] && echo "${STATE_JSON}" | jq empty 2>/dev/null; then
            echo "${STATE_JSON}" > /tmp/final_state.json
            FINAL_ATTEMPT=$(echo "${STATE_JSON}" | jq -r '.attempt // "?"')
            FINAL_FAILED_JOBS=$(echo "${STATE_JSON}" | jq -r '.failed_job_count // "?"')
            FINAL_ERROR_SIGS=$(echo "${STATE_JSON}" | jq -r '.error_signature_count // "?"')
            FINAL_STALL_STREAK=$(echo "${STATE_JSON}" | jq -r '.stall_streak // 0')
          else
            FINAL_ATTEMPT="?"
            FINAL_FAILED_JOBS="?"
            FINAL_ERROR_SIGS="?"
            FINAL_STALL_STREAK="0"
            echo '{}' > /tmp/final_state.json
          fi

          echo "final_attempt=${FINAL_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "final_failed_jobs=${FINAL_FAILED_JOBS}" >> "$GITHUB_OUTPUT"
          echo "final_error_sigs=${FINAL_ERROR_SIGS}" >> "$GITHUB_OUTPUT"
          echo "final_stall_streak=${FINAL_STALL_STREAK}" >> "$GITHUB_OUTPUT"

          

          # ── 4d: Find all Copilot fix PRs that targeted this branch ──
          # These are PRs where base branch = dependabot branch and author is copilot or title matches
          FIX_PRS=$(gh api "repos/${REPO}/pulls?state=all&base=${BRANCH}&per_page=100" \
            --jq '[.[] | select(
              (.title | test("AI GEM UPGRADE"; "i")) or
              (.user.login | test("copilot"; "i")) or
              (.head.ref | test("copilot"; "i"))
            ) | {
              number: .number,
              title: .title,
              state: .state,
              merged: .merged_at != null,
              author: .user.login,
              url: .html_url,
              created_at: .created_at,
              files_changed: .changed_files
            }]' 2>/dev/null || echo '[]')

          echo "${FIX_PRS}" > /tmp/fix_prs.json
          FIX_PR_COUNT=$(echo "${FIX_PRS}" | jq 'length')
          echo "fix_pr_count=${FIX_PR_COUNT}" >> "$GITHUB_OUTPUT"

          # ── 4e: Collect Copilot-authored direct commits on this Dependabot PR ──
          COPILOT_DIRECT_COMMITS=$(gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/commits?per_page=100" \
            --jq '[.[] | select(
              ((.author.login // "") | test("copilot"; "i")) or
              ((.committer.login // "") | test("copilot"; "i")) or
              ((.commit.author.name // "") | test("copilot"; "i")) or
              ((.commit.committer.name // "") | test("copilot"; "i"))
            ) | {
              sha: (.sha[0:7]),
              full_sha: .sha,
              message: ((.commit.message // "") | split("\n")[0]),
              url: (.html_url // ""),
              author: (.author.login // .commit.author.name // "unknown"),
              committed_at: (.commit.author.date // "")
            }]' 2>/dev/null || echo '[]')

          echo "${COPILOT_DIRECT_COMMITS}" > /tmp/copilot_direct_commits.json
          DIRECT_COMMIT_COUNT=$(echo "${COPILOT_DIRECT_COMMITS}" | jq 'length')
          echo "direct_commit_count=${DIRECT_COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

          # ── 4f: Collect files changed across all fix PRs ──
          CHANGED_FILES_SOURCE="none"
          ALL_CHANGED_FILES="[]"
          while read -r FIX_PR_NUM; do
            [[ -z "${FIX_PR_NUM:-}" || "${FIX_PR_NUM}" == "null" ]] && continue
            PR_FILES=$(gh api "repos/${REPO}/pulls/${FIX_PR_NUM}/files" \
              --jq '[.[] | {filename: .filename, status: .status, additions: .additions, deletions: .deletions, patch: (.patch // "")}]' \
              2>/dev/null || echo '[]')
            ALL_CHANGED_FILES=$(echo "${ALL_CHANGED_FILES}" "${PR_FILES}" | jq -s 'add')
          done < <(echo "${FIX_PRS}" | jq -r '.[].number')

          TOTAL_FILES_CHANGED=$(echo "${ALL_CHANGED_FILES}" | jq 'length')
          if [[ "${TOTAL_FILES_CHANGED}" -gt 0 ]]; then
            CHANGED_FILES_SOURCE="fix_prs"
          fi

          # If no fix PR file list exists, try Copilot-authored direct commits
          # on the Dependabot PR branch.
          if [[ "${TOTAL_FILES_CHANGED}" -eq 0 ]]; then
            COPILOT_COMMIT_SHAS=$(jq -r '.[].full_sha' /tmp/copilot_direct_commits.json 2>/dev/null || true)

            ALL_CHANGED_FILES="[]"
            if [[ -n "${COPILOT_COMMIT_SHAS:-}" ]]; then
              while read -r COMMIT_SHA; do
                [[ -z "${COMMIT_SHA:-}" ]] && continue
                COMMIT_FILES=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}" \
                  --jq '[.files[]? | {filename: .filename, status: .status, additions: .additions, deletions: .deletions, patch: (.patch // "")}]' \
                  2>/dev/null || echo '[]')
                ALL_CHANGED_FILES=$(echo "${ALL_CHANGED_FILES}" "${COMMIT_FILES}" | jq -s 'add')
              done <<< "${COPILOT_COMMIT_SHAS}"
            fi

            TOTAL_FILES_CHANGED=$(echo "${ALL_CHANGED_FILES}" | jq 'length')
            if [[ "${TOTAL_FILES_CHANGED}" -gt 0 ]]; then
              CHANGED_FILES_SOURCE="copilot_direct_commits"
            fi
          fi

          # Final fallback: use all files on the Dependabot PR.
          # This can include non-Copilot changes from the dependency bump itself.
          if [[ "${TOTAL_FILES_CHANGED}" -eq 0 ]]; then
            ALL_CHANGED_FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
              --jq '[.[] | {filename: .filename, status: .status, additions: .additions, deletions: .deletions, patch: (.patch // "")}]' \
              2>/dev/null || echo '[]')
            TOTAL_FILES_CHANGED=$(echo "${ALL_CHANGED_FILES}" | jq 'length')
            if [[ "${TOTAL_FILES_CHANGED}" -gt 0 ]]; then
              CHANGED_FILES_SOURCE="dependabot_pr"
            fi
          fi

          # Normalize/merge by file so metrics and patch excerpts are stable.
          ALL_CHANGED_FILES=$(echo "${ALL_CHANGED_FILES}" | jq '
            if type == "array" then
              sort_by(.filename)
              | group_by(.filename)
              | map({
                  filename: .[0].filename,
                  status: .[-1].status,
                  additions: (map(.additions // 0) | add),
                  deletions: (map(.deletions // 0) | add),
                  patch: ((map(.patch // "") | reverse | map(select(length > 0)) | .[0]) // "")
                })
            else []
            end
          ' 2>/dev/null || echo '[]')

          TOTAL_FILES_CHANGED=$(echo "${ALL_CHANGED_FILES}" | jq 'length')

          echo "${ALL_CHANGED_FILES}" > /tmp/all_changed_files.json
          echo "changed_files_source=${CHANGED_FILES_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "total_files_changed=${TOTAL_FILES_CHANGED}" >> "$GITHUB_OUTPUT"

      # ── Step 5: Build & post the summary ──────────────────────
      - name: Post fix summary
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_copilot.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          ATTEMPT_COUNT: ${{ steps.check_copilot.outputs.attempt_count }}
          PR_TITLE: ${{ steps.gather.outputs.pr_title }}
          PR_URL: ${{ steps.gather.outputs.pr_url }}
          FINAL_ATTEMPT: ${{ steps.gather.outputs.final_attempt }}
          FINAL_FAILED_JOBS: ${{ steps.gather.outputs.final_failed_jobs }}
          FINAL_ERROR_SIGS: ${{ steps.gather.outputs.final_error_sigs }}
          FINAL_STALL_STREAK: ${{ steps.gather.outputs.final_stall_streak }}
          HAS_GEM_SUMMARY: ${{ steps.gather.outputs.has_gem_summary }}
          FIX_PR_COUNT: ${{ steps.gather.outputs.fix_pr_count }}
          DIRECT_COMMIT_COUNT: ${{ steps.gather.outputs.direct_commit_count }}
          TOTAL_FILES_CHANGED: ${{ steps.gather.outputs.total_files_changed }}
          CHANGED_FILES_SOURCE: ${{ steps.gather.outputs.changed_files_source }}
          RUN_CONCLUSION: ${{ steps.gather.outputs.run_conclusion }}
        run: |
          set -euo pipefail

          DIRECT_COMMIT_COUNT_INT=${DIRECT_COMMIT_COUNT:-0}

          # Determine outcome wording based on run conclusion
          if [[ "${RUN_CONCLUSION}" == "success" ]]; then
            OUTCOME="✅ CI is now green"
            OUTCOME_EMOJI="✅"
          else
            OUTCOME="❌ CI is still failing"
            OUTCOME_EMOJI="❌"
          fi

          if [[ "${CHANGED_FILES_SOURCE}" == "fix_prs" ]]; then
            CHANGED_FILES_SUMMARY_TEXT="📁 All Files Changed Across Fix PRs"
          elif [[ "${CHANGED_FILES_SOURCE}" == "copilot_direct_commits" ]]; then
            CHANGED_FILES_SUMMARY_TEXT="📁 Files Changed by Copilot Direct Commits (no fix PR)"
          elif [[ "${CHANGED_FILES_SOURCE}" == "dependabot_pr" ]]; then
            CHANGED_FILES_SUMMARY_TEXT="📁 Files Changed on Dependabot PR (final fallback, may include non-Copilot changes)"
          else
            CHANGED_FILES_SUMMARY_TEXT="📁 Changed Files"
          fi

          # ── Build fix PR table ──
          FIX_PR_TABLE=""
          if [[ -f /tmp/fix_prs.json ]]; then
            FIX_PR_TABLE=$(jq -r '
              if length == 0 then "No Copilot fix PRs found."
              else
                "| PR | Title | Status | Author | Created |\n|-----|-------|--------|--------|---------|\n" +
                (map("| [#\(.number)](\(.url)) | \(.title) | \(if .merged then "✅ Merged" elif .state == "open" then "🟡 Open" else "⚫ Closed" end) | \(.author) | \(.created_at | split("T")[0]) |") | join("\n"))
              end
            ' /tmp/fix_prs.json)
          fi

          # ── Build direct-commit table (for no-fix-PR flows) ──
          DIRECT_COMMIT_TABLE=""
          if [[ -f /tmp/copilot_direct_commits.json ]]; then
            DIRECT_COMMIT_TABLE=$(jq -r '
              if length == 0 then ""
              else
                "| Commit | Message | Author | Date |\n|--------|---------|--------|------|\n" +
                (map("| [`\(.sha)`](\(.url)) | \(.message) | \(.author) | \(.committed_at | split("T")[0]) |") | join("\n"))
              end
            ' /tmp/copilot_direct_commits.json)
          fi

          if [[ "${FIX_PR_COUNT}" -eq 0 && "${DIRECT_COMMIT_COUNT_INT}" -gt 0 ]]; then
            FIX_PR_TABLE="No Copilot fix PRs found. Copilot committed directly to this Dependabot PR branch."
          fi

          COPILOT_DIRECT_COMMIT_SECTION=""
          if [[ "${DIRECT_COMMIT_COUNT_INT}" -gt 0 ]]; then
            COPILOT_DIRECT_COMMIT_SECTION=$(cat <<EOF
          ### 🧩 Copilot Direct Commits (no fix PR)

          ${DIRECT_COMMIT_TABLE}

          ---
          EOF
            )
          fi

          # ── Build changed files table ──
          CHANGED_FILES_TABLE=""
          if [[ -f /tmp/all_changed_files.json ]]; then
            CHANGED_FILES_TABLE=$(jq -r '
              if length == 0 then "No files changed."
              else
                "| File | Status | +/- |\n|------|--------|-----|\n" +
                (map("| `\(.filename)` | \(.status) | +\(.additions) / -\(.deletions) |") | join("\n"))
              end
            ' /tmp/all_changed_files.json)
          fi

          # ── Build line-level file change excerpts for dropdown ──
          CHANGED_FILES_PATCH_BODY="No line-level file changes available."
          if [[ -f /tmp/all_changed_files.json ]]; then
            python3 <<'PYEOF'
          import json

          MAX_FILES = 20
          MAX_PATCH_LINES = 120
          MAX_PATCH_CHARS = 6000

          try:
              with open('/tmp/all_changed_files.json', 'r', encoding='utf-8') as f:
                  files = json.load(f)
          except Exception:
              files = []

          if not isinstance(files, list):
              files = []

          parts = []
          if not files:
              parts.append("No line-level file changes available.")
          else:
              for file_obj in files[:MAX_FILES]:
                  name = file_obj.get('filename', '(unknown file)')
                  status = file_obj.get('status', 'unknown')
                  adds = file_obj.get('additions', 0)
                  dels = file_obj.get('deletions', 0)
                  patch = (file_obj.get('patch') or '').rstrip()

                  parts.append(f"#### {name} ({status}, +{adds} / -{dels})")
                  if patch:
                      truncated = False
                      snippet = patch
                      if len(snippet) > MAX_PATCH_CHARS:
                          snippet = snippet[:MAX_PATCH_CHARS].rstrip() + "\n... [truncated]"
                          truncated = True

                      lines = snippet.splitlines()
                      if len(lines) > MAX_PATCH_LINES:
                          snippet = "\n".join(lines[:MAX_PATCH_LINES]) + "\n... [truncated]"
                          truncated = True

                      parts.append("```diff")
                      parts.append(snippet)
                      parts.append("```")
                      if truncated:
                          parts.append("_Patch excerpt truncated for comment size._")
                  else:
                      parts.append("_Patch unavailable from GitHub API (often large or binary files)._")

              if len(files) > MAX_FILES:
                  parts.append(f"_Showing first {MAX_FILES} of {len(files)} changed files._")

          with open('/tmp/changed_files_patch_body.md', 'w', encoding='utf-8') as f:
              f.write("\n\n".join(parts).strip() + "\n")
          PYEOF
            CHANGED_FILES_PATCH_BODY=$(cat /tmp/changed_files_patch_body.md)
          fi

          # ── Determine outcome ──
          # ── Build the summary comment ──
          cat > /tmp/summary_comment.md <<SUMMARY_EOF
          ${SUMMARY_MARKER}
          ## ${OUTCOME_EMOJI} Copilot Fix Summary — Post-Mortem

          > This is an automated summary of all Copilot fix attempts on this Dependabot PR.
          > Use this for experiment tracking and to evaluate Copilot's effectiveness.

          ---

          ### 📋 Overview

          | Metric | Value |
          |--------|-------|
          | **Dependabot PR** | [#${PR_NUMBER}](${PR_URL}) — ${PR_TITLE} |
          | **Branch** | \`${BRANCH}\` |
          | **Outcome** | ${OUTCOME} |
          | **Total Copilot attempts** | ${ATTEMPT_COUNT} |
          | **Fix PRs created** | ${FIX_PR_COUNT} |
          | **Direct Copilot commits** | ${DIRECT_COMMIT_COUNT_INT} |
          | **Total files changed** | ${TOTAL_FILES_CHANGED} |
          | **Final stall streak** | ${FINAL_STALL_STREAK} |
          | **CI run** | [View](${RUN_URL}) |

          ---

          ### 📊 Metrics at Last Failure (before final fix)

          | Metric | Value |
          |--------|-------|
          | Attempt | #${FINAL_ATTEMPT} |
          | Failed jobs | ${FINAL_FAILED_JOBS} |
          | Error signatures | ${FINAL_ERROR_SIGS} |
          | Stall streak | ${FINAL_STALL_STREAK} |

          ---

          ### 🔧 Copilot Fix PRs

          ${FIX_PR_TABLE}

          ${COPILOT_DIRECT_COMMIT_SECTION}

          ---

          ### 📁 File Change Metrics

          _Source: ${CHANGED_FILES_SUMMARY_TEXT}_

          ${CHANGED_FILES_TABLE}

          <details>
          <summary>🧾 Working Tree File Changes (line-level excerpts)</summary>

          ${CHANGED_FILES_PATCH_BODY}
          </details>

          ---

          SUMMARY_EOF

          # ── Append gem summary if available ──
          if [[ "${HAS_GEM_SUMMARY}" == "true" && -f /tmp/gem_summary.md ]]; then
            cat >> /tmp/summary_comment.md <<GEM_EOF

          ### 💎 Gem Changes That Triggered This

          $(cat /tmp/gem_summary.md)

          ---

          GEM_EOF
          fi

          # ── Append experiment data JSON block ──
          EXPERIMENT_JSON=$(jq -n \
            --arg pr_number "${PR_NUMBER}" \
            --arg branch "${BRANCH}" \
            --arg pr_title "${PR_TITLE}" \
            --argjson attempt_count "${ATTEMPT_COUNT}" \
            --argjson fix_pr_count "${FIX_PR_COUNT}" \
            --argjson total_files_changed "${TOTAL_FILES_CHANGED}" \
            --arg final_attempt "${FINAL_ATTEMPT}" \
            --arg final_failed_jobs "${FINAL_FAILED_JOBS}" \
            --arg final_error_sigs "${FINAL_ERROR_SIGS}" \
            --arg final_stall_streak "${FINAL_STALL_STREAK}" \
            --arg outcome "ci_green" \
            --arg green_run_url "${RUN_URL}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              pr_number: $pr_number,
              branch: $branch,
              pr_title: $pr_title,
              outcome: $outcome,
              total_attempts: $attempt_count,
              fix_prs_created: $fix_pr_count,
              total_files_changed: $total_files_changed,
              last_failure_state: {
                attempt: $final_attempt,
                failed_jobs: $final_failed_jobs,
                error_signatures: $final_error_sigs,
                stall_streak: $final_stall_streak
              },
              green_run_url: $green_run_url,
              completed_at: $timestamp
            }')

          cat >> /tmp/summary_comment.md <<DATA_EOF

          ### 🧪 Experiment Data (machine-readable)

          > Use this JSON block for tracking Copilot fix effectiveness across PRs.

          \`\`\`json
          ${EXPERIMENT_JSON}
          \`\`\`

          ---
          _This summary was auto-generated by the Copilot post-fix summary workflow._
          DATA_EOF

          # ── Post the summary comment ──
          # Always create a new summary comment (one per run/attempt)
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --field body=@/tmp/summary_comment.md
          echo "✅ Posted new fix summary on PR #${PR_NUMBER}"

      # ── Step 6: Add summary label ─────────────────────────────
      - name: Add summary label
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_copilot.outputs.skip != 'true' &&
          github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          # Remove the in-progress label when a fix is complete (ignore if missing)
          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels/copilot-ci-fix-requested" \
            --method DELETE 2>/dev/null || true

          # Ensure label exists
          gh api "repos/${REPO}/labels" \
            --method POST \
            --field name="copilot-fix-complete" \
            --field color="0e8a16" \
            --field description="Copilot successfully fixed CI on this Dependabot PR" \
            2>/dev/null || true

          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
            --method POST \
            --input - <<< '{"labels":["copilot-fix-complete"]}'

          echo "✅ Added 'copilot-fix-complete' label to PR #${PR_NUMBER}"