name: trigger-copilot-on-dependabot-failure

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches:
      - 'dependabot/**'

permissions: {}

env:
  MAX_COPILOT_RETRIES: "6"
  MAX_STALL_ATTEMPTS: "3"
  COPILOT_MARKER: "<!-- copilot-fix-attempt-v2 -->"
  COPILOT_PROGRESS_MARKER: "<!-- copilot-fix-progress -->"
  MAX_REACHED_MARKER: "<!-- copilot-fix-max-reached -->"
  CONTROLLER_STATE_MARKER: "<!-- copilot-controller-state -->"

concurrency:
  group: copilot-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  trigger-copilot:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve PR number
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh api "repos/${REPO}/pulls" \
            --method GET \
            -f head="${REPO%%/*}:${BRANCH}" \
            -f state=open \
            --jq '.[0].number // empty')

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "⚠️  No open PR found for branch ${BRANCH}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Found PR #${PR_NUMBER}"

      - name: Count previous attempts
        if: steps.find_pr.outputs.skip != 'true'
        id: count
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          RAW_COUNT=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | startswith(\"${COPILOT_MARKER}\"))] | length" \
            | paste -sd+ -)
          ATTEMPT_COUNT=$(( ${RAW_COUNT:-0} + 1 ))
          echo "attempt=${ATTEMPT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Copilot fix attempt #${ATTEMPT_COUNT} (max: ${MAX_COPILOT_RETRIES})"

      - name: Check retry limit
        if: steps.find_pr.outputs.skip != 'true'
        id: check_limit
        env:
          ATTEMPT: ${{ steps.count.outputs.attempt }}
        run: |
          set -euo pipefail

          if [[ "${ATTEMPT}" -gt "${MAX_COPILOT_RETRIES}" ]]; then
            echo "🛑 Max retries (${MAX_COPILOT_RETRIES}) exceeded. Stopping."
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post max-retry notice
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          RAW_EXISTING=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"$MAX_REACHED_MARKER\"))] | length" \
            | paste -sd+ -)
          EXISTING=$(( ${RAW_EXISTING:-0} ))

          if [[ "${EXISTING}" -gt 0 ]]; then
            echo "ℹ️  Max-reached notice already posted. Skipping duplicate."
            exit 0
          fi

          cat > /tmp/max_reached_body.md <<'MAX_NOTICE_EOF'
          ## 🛑 Automated fix limit reached
          MAX_NOTICE_EOF

          cat >> /tmp/max_reached_body.md <<MAX_NOTICE_EOF

          Copilot has attempted **${MAX_COPILOT_RETRIES}** fixes and CI is still failing.

          **Manual intervention is required.** Please review:
          - The latest [failing CI run](${RUN_URL})
          - Previous Copilot fix PRs on this branch

          Consider:
          1. Manually fixing the remaining issues
          2. Closing this Dependabot PR if the upgrade isn't feasible right now
          3. Increasing \`MAX_COPILOT_RETRIES\` if Copilot was making progress
          MAX_NOTICE_EOF

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --field body=@/tmp/max_reached_body.md

      - name: Fetch failure logs
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure")
                   | {name: .name,
                      steps: [.steps[] | select(.conclusion == "failure") | .name]}]' \
            > /tmp/failed_jobs.json

          echo "::group::Failed jobs JSON"
          cat /tmp/failed_jobs.json
          echo "::endgroup::"

          : > /tmp/failure_logs.txt

          MAX_TOTAL_LINES=4000
          MAX_TOTAL_CHARS=30000
          TOTAL_LINES=0
          TOTAL_CHARS=0
          INCLUDED_JOBS=0
          SKIPPED_JOBS=0

          FAILED_JOBS=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | "\(.id)\t\(.name)"')

          if [[ -z "${FAILED_JOBS:-}" ]]; then
            echo "No failed jobs found for run ${RUN_ID}." > /tmp/failure_logs.txt
          else
            while IFS=$'\t' read -r FAILED_JOB_ID FAILED_JOB_NAME; do
              [[ -z "${FAILED_JOB_ID:-}" ]] && continue

              if ! gh api "repos/${REPO}/actions/jobs/${FAILED_JOB_ID}/logs" > /tmp/failed_job_raw.zip 2>/dev/null; then
                continue
              fi

              PYTHON_BIN="python3"
              if ! command -v python3 >/dev/null 2>&1; then
                if command -v python >/dev/null 2>&1; then
                  PYTHON_BIN="python"
                else
                  echo "⚠️  Neither python3 nor python is available on the runner; cannot unzip logs for job ${FAILED_JOB_ID}." >&2
                  continue
                fi
              fi

          cat > /tmp/unzip_job_logs.py <<'PYEOF'
          import io
          import sys
          import zipfile

          def main():
              data = sys.stdin.buffer.read()
              try:
                  zf = zipfile.ZipFile(io.BytesIO(data))
              except zipfile.BadZipFile:
                  sys.stdout.write(data.decode("utf-8", errors="replace"))
                  return 0
              except Exception as exc:
                  sys.stderr.write(f"failed to open zip: {exc}\n")
                  return 1
              contents = []
              for name in zf.namelist():
                  try:
                      contents.append(zf.read(name).decode("utf-8", errors="replace"))
                  except Exception as exc:
                      sys.stderr.write(f"failed to read {name}: {exc}\n")
              sys.stdout.write("\n".join(contents))
              return 0

          if __name__ == "__main__":
              raise SystemExit(main())
          PYEOF

              if ! cat /tmp/failed_job_raw.zip | "${PYTHON_BIN}" /tmp/unzip_job_logs.py > /tmp/failed_job_full.log 2>/tmp/failed_job_unzip.err; then
                echo "⚠️  Failed to unzip logs for job ${FAILED_JOB_ID}; raw zip saved to /tmp/failed_job_raw.zip" >&2
                cat /tmp/failed_job_unzip.err >&2 || true
                continue
              fi

              printf -- '--- Job %s (%s) ---\n\n' "${FAILED_JOB_ID}" "${FAILED_JOB_NAME:-unknown}" > /tmp/job_header.txt

              HEADER_LINES=$(wc -l < /tmp/job_header.txt | tr -d ' ')
              HEADER_CHARS=$(wc -c < /tmp/job_header.txt | tr -d ' ')
              REMAINING_LINES=$(( MAX_TOTAL_LINES - TOTAL_LINES ))
              REMAINING_CHARS=$(( MAX_TOTAL_CHARS - TOTAL_CHARS ))

              if [[ "${HEADER_LINES}" -gt "${REMAINING_LINES}" || "${HEADER_CHARS}" -gt "${REMAINING_CHARS}" ]]; then
                break
              fi

              REMAINING_JOB_LINES=$(( REMAINING_LINES - HEADER_LINES ))
              REMAINING_JOB_CHARS=$(( REMAINING_CHARS - HEADER_CHARS ))

              awk -v max_lines="${REMAINING_JOB_LINES}" -v max_chars="${REMAINING_JOB_CHARS}" '
                BEGIN {
                  IGNORECASE=1
                  in_block=0
                  block_count=0
                  found_any=0
                  included_any=0
                  total_lines=0
                  total_chars=0
                  truncated=0
                }

                function block_chars(  i, c) {
                  c=0
                  for (i = 1; i <= block_count; i++) c += length(block[i]) + 1
                  return c
                }

                function flush_block(  i, block_lines, block_chars_count, remaining_lines, remaining_chars, note_line, note_chars, partial_lines, partial_chars, line_chars) {
                  if (block_count == 0) return

                  block_lines = block_count + 1
                  block_chars_count = block_chars() + 1

                  if ((total_lines + block_lines) <= max_lines && (total_chars + block_chars_count) <= max_chars) {
                    for (i = 1; i <= block_count; i++) print block[i]
                    print ""
                    total_lines += block_lines
                    total_chars += block_chars_count
                    included_any=1
                  } else {
                    # Fall back to a partial excerpt when the full block does not fit.
                    remaining_lines = max_lines - total_lines
                    remaining_chars = max_chars - total_chars
                    note_line = "[NOTE] Partial excerpt shown; full error block exceeded remaining budget."
                    note_chars = length(note_line) + 1
                    partial_lines = 0
                    partial_chars = 0

                    if (remaining_lines > 2 && remaining_chars > note_chars + 1) {
                      for (i = 1; i <= block_count; i++) {
                        line_chars = length(block[i]) + 1

                        # Reserve space for the note line + trailing blank line.
                        if ((total_lines + partial_lines + 2) > max_lines) break
                        if ((total_chars + partial_chars + line_chars + note_chars + 1) > max_chars) break

                        print block[i]
                        partial_lines += 1
                        partial_chars += line_chars
                      }

                      if (partial_lines > 0) {
                        print note_line
                        print ""
                        total_lines += partial_lines + 2
                        total_chars += partial_chars + note_chars + 1
                        included_any=1
                      }
                    }

                    truncated=1
                  }

                  delete block
                  block_count=0
                }

                {
                  line = $0

                  if (line ~ /(error|exception|traceback|fatal|failed|failure)/) {
                    found_any=1
                    if (!in_block) {
                      in_block=1
                      block_count=0
                    }
                    block[++block_count] = line
                    next
                  }

                  if (in_block) {
                    if (line ~ /^$/ || line ~ /^##\[group\]/ || line ~ /^##\[endgroup\]/ || line ~ /^\+\s*\w/) {
                      flush_block()
                      in_block=0
                      next
                    }
                    block[++block_count] = line
                    next
                  }
                }

                END {
                  if (in_block) flush_block()

                  if (!found_any) {
                    print "No error-pattern blocks found for this job."
                    print ""
                  } else if (!included_any) {
                    print "No error excerpt could fit within the remaining size budget for this job."
                    print ""
                  }

                  if (truncated) {
                    print "[NOTE] Additional error content was truncated to stay within size limits."
                    print ""
                  }
                }
              ' /tmp/failed_job_full.log > /tmp/job_error_blocks.txt

              {
                cat /tmp/job_header.txt
                cat /tmp/job_error_blocks.txt
              } > /tmp/job_section.txt

              JOB_SECTION_LINES=$(wc -l < /tmp/job_section.txt | tr -d ' ')
              JOB_SECTION_CHARS=$(wc -c < /tmp/job_section.txt | tr -d ' ')
              REMAINING_LINES=$(( MAX_TOTAL_LINES - TOTAL_LINES ))
              REMAINING_CHARS=$(( MAX_TOTAL_CHARS - TOTAL_CHARS ))

              if [[ "${JOB_SECTION_LINES}" -le "${REMAINING_LINES}" && "${JOB_SECTION_CHARS}" -le "${REMAINING_CHARS}" ]]; then
                cat /tmp/job_section.txt >> /tmp/failure_logs.txt
                TOTAL_LINES=$(( TOTAL_LINES + JOB_SECTION_LINES ))
                TOTAL_CHARS=$(( TOTAL_CHARS + JOB_SECTION_CHARS ))
                INCLUDED_JOBS=$(( INCLUDED_JOBS + 1 ))
              else
                SKIPPED_JOBS=$(( SKIPPED_JOBS + 1 ))
              fi

              if [[ "${TOTAL_LINES}" -ge "${MAX_TOTAL_LINES}" || "${TOTAL_CHARS}" -ge "${MAX_TOTAL_CHARS}" ]]; then
                break
              fi
            done <<< "${FAILED_JOBS}"

            if [[ "${INCLUDED_JOBS}" -eq 0 ]]; then
              {
                echo "No failed-job error excerpts could be included without exceeding limits (4,000 lines / 30,000 chars)."
                echo "Partial excerpts are enabled, but this run had no budget left for any excerpt."
              } > /tmp/failure_logs.txt
            elif [[ "${SKIPPED_JOBS}" -gt 0 ]]; then
              {
                echo ""
                echo "[NOTE] Skipped ${SKIPPED_JOBS} failed job(s) because no additional error excerpts fit in the remaining budget."
              } >> /tmp/failure_logs.txt
            fi
          fi

          FAILED_JOB_COUNT=$(jq 'length' /tmp/failed_jobs.json)
          echo "failed_job_count=${FAILED_JOB_COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Current failed job count: ${FAILED_JOB_COUNT}"

          ERROR_SIGS=$(grep -iE '(error|exception|traceback|fatal|failed|failure)' /tmp/failure_logs.txt \
            | sed 's/^[[:space:]]*//' \
            | sort -u \
            | head -20 \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            || echo '[]')
          ERROR_SIG_COUNT=$(echo "${ERROR_SIGS}" | jq 'length')
          echo "error_signature_count=${ERROR_SIG_COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Distinct error signatures: ${ERROR_SIG_COUNT}"

          jq -n \
            --argjson count "${FAILED_JOB_COUNT}" \
            --argjson sig_count "${ERROR_SIG_COUNT}" \
            --argjson sigs "${ERROR_SIGS}" \
            '{failed_job_count: $count, error_signature_count: $sig_count, error_signatures: $sigs}' \
            > /tmp/current_metrics.json

          echo "::group::Current metrics"
          cat /tmp/current_metrics.json
          echo "::endgroup::"

          DELIM="GHEOF_$(openssl rand -hex 8)"

          {
            echo "failed_jobs<<${DELIM}"
            cat /tmp/failed_jobs.json
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "log_snippet<<${DELIM}"
            cat /tmp/failure_logs.txt
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "current_metrics<<${DELIM}"
            cat /tmp/current_metrics.json
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Read previous controller state
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        id: prev_state
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          STATE_BODY=$(
            gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${CONTROLLER_STATE_MARKER}\"))] | last // empty | .body" \
            || echo ''
          )

          STATE_JSON=""
          if [[ -n "${STATE_BODY:-}" ]]; then
            STATE_JSON=$(echo "${STATE_BODY}" | sed -n '/```json/,/```/{/```/d;p}' || echo '')
          fi

          if [[ -z "${STATE_JSON:-}" ]] || ! echo "${STATE_JSON}" | jq empty 2>/dev/null; then
            echo "ℹ️  No previous controller state found. First tracked attempt."
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            echo "prev_failed_job_count=" >> "$GITHUB_OUTPUT"
            echo "prev_error_signature_count=" >> "$GITHUB_OUTPUT"
            echo "stall_streak=0" >> "$GITHUB_OUTPUT"
          else
            PREV_COUNT=$(echo "${STATE_JSON}" | jq -r '.failed_job_count // empty')
            PREV_SIG_COUNT=$(echo "${STATE_JSON}" | jq -r '.error_signature_count // 0')
            PREV_STALL=$(echo "${STATE_JSON}" | jq -r '.stall_streak // 0')
            echo "has_previous=true" >> "$GITHUB_OUTPUT"
            echo "prev_failed_job_count=${PREV_COUNT}" >> "$GITHUB_OUTPUT"
            echo "prev_error_signature_count=${PREV_SIG_COUNT}" >> "$GITHUB_OUTPUT"
            echo "stall_streak=${PREV_STALL}" >> "$GITHUB_OUTPUT"
            echo "📊 Previous state — failed_job_count: ${PREV_COUNT}, error_sig_count: ${PREV_SIG_COUNT}, stall_streak: ${PREV_STALL}"
          fi

      - name: Check for improvement
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        id: improvement
        env:
          CURRENT_COUNT: ${{ steps.logs.outputs.failed_job_count }}
          CURRENT_SIG_COUNT: ${{ steps.logs.outputs.error_signature_count }}
          HAS_PREVIOUS: ${{ steps.prev_state.outputs.has_previous }}
          PREV_COUNT: ${{ steps.prev_state.outputs.prev_failed_job_count }}
          PREV_SIG_COUNT: ${{ steps.prev_state.outputs.prev_error_signature_count }}
          PREV_STALL: ${{ steps.prev_state.outputs.stall_streak }}
        run: |
          set -euo pipefail

          STALL_STREAK=0

          if [[ "${HAS_PREVIOUS}" == "true" && -n "${PREV_COUNT:-}" ]]; then
            IMPROVED=false

            if [[ "${CURRENT_COUNT}" -lt "${PREV_COUNT}" ]]; then
              echo "✅ Job count improved: ${PREV_COUNT} → ${CURRENT_COUNT}"
              IMPROVED=true
            fi

            if [[ "${CURRENT_SIG_COUNT}" -lt "${PREV_SIG_COUNT:-0}" ]]; then
              echo "✅ Error signature count improved: ${PREV_SIG_COUNT} → ${CURRENT_SIG_COUNT}"
              IMPROVED=true
            fi

            if [[ "${IMPROVED}" == "true" ]]; then
              STALL_STREAK=0
            else
              STALL_STREAK=$(( PREV_STALL + 1 ))
              echo "⚠️  No improvement:"
              echo "    Jobs:      ${PREV_COUNT} → ${CURRENT_COUNT}"
              echo "    Sig count: ${PREV_SIG_COUNT:-?} → ${CURRENT_SIG_COUNT}"
              echo "    Stall streak: ${STALL_STREAK}/${MAX_STALL_ATTEMPTS}"
            fi
          else
            echo "ℹ️  No previous data — baseline attempt."
            STALL_STREAK=0
          fi

          echo "stall_streak=${STALL_STREAK}" >> "$GITHUB_OUTPUT"

          if [[ "${STALL_STREAK}" -ge "${MAX_STALL_ATTEMPTS}" ]]; then
            echo "🚩 Stall streak ${STALL_STREAK} ≥ threshold ${MAX_STALL_ATTEMPTS} — Copilot will receive escalated instructions."
          fi

      - name: Fetch gem change summary
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        id: gem_summary
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          GEM_REVIEW_BODY=$(
            gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq '[.[] | select(.body | startswith("## Dependency change summary"))] | last // empty | .body' \
            || echo ''
          )

          if [[ -z "${GEM_REVIEW_BODY:-}" ]]; then
            echo "ℹ️  No gem review comment found on PR. Skipping gem summary."
            echo "has_gem_summary=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Found gem review comment on PR #${PR_NUMBER}"
            echo "has_gem_summary=true" >> "$GITHUB_OUTPUT"

            echo "${GEM_REVIEW_BODY}" > /tmp/gem_summary.md

            DELIM="GHEOF_$(openssl rand -hex 8)"
            {
              echo "gem_summary<<${DELIM}"
              cat /tmp/gem_summary.md
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Copilot trigger comment
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        env:
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          ATTEMPT: ${{ steps.count.outputs.attempt }}
          HAS_PREVIOUS: ${{ steps.prev_state.outputs.has_previous }}
          PREV_FAILED_JOB_COUNT: ${{ steps.prev_state.outputs.prev_failed_job_count }}
          PREV_ERROR_SIG_COUNT: ${{ steps.prev_state.outputs.prev_error_signature_count }}
          CURRENT_FAILED_JOB_COUNT: ${{ steps.logs.outputs.failed_job_count }}
          CURRENT_ERROR_SIG_COUNT: ${{ steps.logs.outputs.error_signature_count }}
          STALL_STREAK: ${{ steps.improvement.outputs.stall_streak }}
          HAS_GEM_SUMMARY: ${{ steps.gem_summary.outputs.has_gem_summary }}
        run: |
          set -euo pipefail

          GEM_SUMMARY_TEXT=""
          if [[ "${HAS_GEM_SUMMARY}" == "true" && -f /tmp/gem_summary.md ]]; then
            GEM_SUMMARY_TEXT=$(cat /tmp/gem_summary.md)
          fi

          if [[ "${ATTEMPT}" -eq 1 ]]; then
            HEADER="## 🤖 Copilot: Fix CI Failures (Attempt #${ATTEMPT} of ${MAX_COPILOT_RETRIES})"
            CONTEXT="This is the **first** automated fix attempt. Keep changes minimal and focused only on making CI green."
            CONSTRAINTS_BLOCK="### Constraints
          - Do not modify more than 10 files.
          - Do not add or remove gems; adapt code/tests to the Dependabot versions.
          - Do not downgrade dependencies.
          - Avoid refactors or new features/tests unrelated to the fix."

          elif [[ "${STALL_STREAK}" -ge "${MAX_STALL_ATTEMPTS}" ]]; then
            HEADER="## 🚩 Escalated Fix CI Failures (Attempt #${ATTEMPT} of ${MAX_COPILOT_RETRIES})"
            CONTEXT="**Stall streak ${STALL_STREAK}/${MAX_STALL_ATTEMPTS}: no improvement in failed jobs/error signatures. Change strategy now.** Stop editing the same spots; follow stack traces and gem migration notes. Be surgical (≤8 files) and avoid repeating prior edits."
            CONSTRAINTS_BLOCK="### Constraints (escalated)
          - Do not modify more than 8 files.
          - Do not add or remove gems; adapt code/tests to the Dependabot versions.
          - Do not downgrade dependencies.
          - Do not re-apply changes already tried in earlier attempts.
          - Avoid refactors or new features/tests unrelated to the fix."

          else
            HEADER="## 🔄 Copilot: Retry Fix CI Failures (Attempt #${ATTEMPT} of ${MAX_COPILOT_RETRIES})"
            CONTEXT="Previous fixes did not make CI green. Read prior Copilot PRs/comments, avoid repeating the same edits, review upgraded gems' changelogs, and trace the full stack to find the root cause."
            CONSTRAINTS_BLOCK="### Constraints
          - Do not modify more than 10 files.
          - Do not add or remove gems; adapt code/tests to the Dependabot versions.
          - Do not downgrade dependencies.
          - Do not re-apply changes already tried.
          - Avoid refactors or new features/tests unrelated to the fix."
          fi

          FAILED_JOBS_JSON=$(cat /tmp/failed_jobs.json 2>/dev/null || echo '[]')
          LOG_TEXT=$(cat /tmp/failure_logs.txt 2>/dev/null || echo 'No logs captured.')

          SIGS_SECTION="None captured."
          if [[ -f /tmp/current_metrics.json ]]; then
            SIGS=$(jq -r '.error_signatures[]' /tmp/current_metrics.json 2>/dev/null || echo '')
            if [[ -n "${SIGS:-}" ]]; then
              SIGS_SECTION=$(printf '```\n%s\n```\n' "${SIGS}")
            fi
          fi

          if [[ "${HAS_GEM_SUMMARY}" == "true" && -n "${GEM_SUMMARY_TEXT:-}" ]]; then
            GEM_SECTION="${GEM_SUMMARY_TEXT}"
          else
            GEM_SECTION="No prior Copilot PR summary found; review Gemfile/Gemfile.lock and the Dependabot diff."
          fi

          if [[ "${ATTEMPT}" -eq 1 ]]; then
            DEPENDENCY_SECTION="### Changes in This Dependabot PR (from prior Copilot PR)
          ${GEM_SECTION}"
            PROGRESS_UPDATES_SECTION=""
            PREVIOUS_ATTEMPTS_SECTION=""
          else
            DEPENDENCY_SECTION=""
            PROGRESS_UPDATES_SECTION="### Progress Updates (edit inline)
          - After each step, update the checklist above with status + one-line summary."
          fi

          if [[ "${HAS_PREVIOUS}" == "true" && -n "${PREV_FAILED_JOB_COUNT:-}" ]]; then
            PREV_ATTEMPT=$(( ATTEMPT - 1 ))
            JOB_CHANGE="⚠️ No change"
            if [[ "${CURRENT_FAILED_JOB_COUNT}" -lt "${PREV_FAILED_JOB_COUNT}" ]]; then
              JOB_CHANGE="✅ Improved"
            elif [[ "${CURRENT_FAILED_JOB_COUNT}" -gt "${PREV_FAILED_JOB_COUNT}" ]]; then
              JOB_CHANGE="❌ Regressed"
            fi

            SIG_CHANGE="⚠️ No change"
            if [[ "${CURRENT_ERROR_SIG_COUNT}" -lt "${PREV_ERROR_SIG_COUNT:-0}" ]]; then
              SIG_CHANGE="✅ Improved"
            elif [[ "${CURRENT_ERROR_SIG_COUNT}" -gt "${PREV_ERROR_SIG_COUNT:-0}" ]]; then
              SIG_CHANGE="❌ Regressed"
            fi

            STALL_CHANGE="⚠️ No progress"
            if [[ "${STALL_STREAK}" -eq 0 ]]; then
              STALL_CHANGE="✅ Reset"
            fi

            PREV_SECTION="| Metric | Previous (Attempt #${PREV_ATTEMPT}) | Current (Attempt #${ATTEMPT}) | Change |
          |--------|---------|---------|--------|
          | Failed jobs | ${PREV_FAILED_JOB_COUNT} | ${CURRENT_FAILED_JOB_COUNT} | ${JOB_CHANGE} |
          | Error signatures | ${PREV_ERROR_SIG_COUNT:-?} | ${CURRENT_ERROR_SIG_COUNT} | ${SIG_CHANGE} |
          | Stall streak | — | ${STALL_STREAK} / ${MAX_STALL_ATTEMPTS} | ${STALL_CHANGE} |

          If no improvement, switch strategy; if stall streak meets the threshold, expect the escalated prompt."
          else
            PREV_SECTION="First tracked attempt for metrics."
          fi

          if [[ "${ATTEMPT}" -gt 1 ]]; then
            PREVIOUS_ATTEMPTS_SECTION="### Previous Attempts (brief deltas)
          ${PREV_SECTION}"
          fi

          cat > /tmp/copilot_comment.md <<COMMENT
          ${COPILOT_MARKER}
          @copilot

          ${HEADER}

          ${CONTEXT}

          ### Latest CI Failure Details
          - 🔗 **Failing CI run:** ${RUN_URL}
          - 🏗️ **Failed workflow:** ${WORKFLOW_NAME}
          - 📊 **Attempt:** #${ATTEMPT} of ${MAX_COPILOT_RETRIES}
          - 📉 **Failed job count:** ${CURRENT_FAILED_JOB_COUNT}
          - 🔍 **Distinct error signatures:** ${CURRENT_ERROR_SIG_COUNT}

          **Failure log excerpt (failed jobs, complete error blocks only, max 4,000 lines and ~30,000 chars):**
          \`\`\`
          ${LOG_TEXT}
          \`\`\`

          **Failed jobs:**
          \`\`\`json
          ${FAILED_JOBS_JSON}
          \`\`\`

          ### Detected Error Signatures (deduplicated)
          ${SIGS_SECTION}

          ${CONSTRAINTS_BLOCK}

          ### What Changed in This Attempt
          - Summarize the code/config/test changes you apply in this attempt.

          ${DEPENDENCY_SECTION}

          ### Work Plan (5-step checklist)
          - Use the single checklist below; do not create new checklist comments.
          - Edit the same comment after each step (Done / In progress / Blocked + one-line reason).

          \`\`\`markdown
          ${COPILOT_PROGRESS_MARKER}
          ### 🤖 Copilot Fix Progress

          - [ ] **Step 1 — Understand the failures:**
          - [ ] **Step 2 — Plan and apply fixes:**
          - [ ] **Step 3 — Run the full test suite:**
          - [ ] **Step 4 — Create the fix PR:**
          - [ ] **Step 5 — Iterate until green:**
          - [ ] **Ready to merge ✅**
          \`\`\`

          ${PROGRESS_UPDATES_SECTION}

          ${PREVIOUS_ATTEMPTS_SECTION}

          ---
          _This comment was auto-generated by the Dependabot CI fix automation (attempt #${ATTEMPT})._
          COMMENT

      - name: Post Copilot trigger comment
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          ATTEMPT: ${{ steps.count.outputs.attempt }}
        run: |
          set -euo pipefail

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --field body=@/tmp/copilot_comment.md

          echo "✅ Posted Copilot trigger comment (attempt #${ATTEMPT}) on PR #${PR_NUMBER}"

      - name: Add label to Dependabot PR
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          gh api "repos/${REPO}/labels" \
            --method POST \
            --field name="copilot-ci-fix-requested" \
            --field color="1d76db" \
            --field description="Copilot has been asked to fix CI on this PR" \
            2>/dev/null || true

          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
            --method POST \
            --input - <<< '{"labels":["copilot-ci-fix-requested"]}'

          # If CI failed again and a new attempt is being triggered, this PR is not complete.
          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels/copilot-fix-complete" \
            --method DELETE 2>/dev/null || true

      - name: Persist controller state
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          ATTEMPT: ${{ steps.count.outputs.attempt }}
          CURRENT_COUNT: ${{ steps.logs.outputs.failed_job_count }}
          ERROR_SIG_COUNT: ${{ steps.logs.outputs.error_signature_count }}
          STALL_STREAK: ${{ steps.improvement.outputs.stall_streak }}
        run: |
          set -euo pipefail

          STATE_JSON=$(jq -n \
            --argjson attempt "${ATTEMPT}" \
            --argjson failed_job_count "${CURRENT_COUNT}" \
            --argjson error_signature_count "${ERROR_SIG_COUNT}" \
            --argjson stall_streak "${STALL_STREAK}" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              attempt: $attempt,
              failed_job_count: $failed_job_count,
              error_signature_count: $error_signature_count,
              stall_streak: $stall_streak,
              updated_at: $updated_at
            }')

          cat > /tmp/controller_state_comment.md <<STATE_EOF
          ${CONTROLLER_STATE_MARKER}
          ### 📈 Copilot Controller State (attempt #${ATTEMPT})

          > **Do not edit this comment** — it is used by the automation to track progress.

          \`\`\`json
          ${STATE_JSON}
          \`\`\`

          | Metric | Value |
          |--------|-------|
          | Attempt | #${ATTEMPT} |
          | Failed jobs | ${CURRENT_COUNT} |
          | Error signatures | ${ERROR_SIG_COUNT} |
          | Stall streak | ${STALL_STREAK} / ${MAX_STALL_ATTEMPTS} |
          STATE_EOF

          EXISTING_COMMENT_ID=$(
            gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${CONTROLLER_STATE_MARKER}\"))] | last // empty | .id" \
            || echo ''
          )

          if [[ -n "${EXISTING_COMMENT_ID:-}" && "${EXISTING_COMMENT_ID}" != "null" ]]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH \
              --field body=@/tmp/controller_state_comment.md
            echo "📝 Updated controller state comment (id: ${EXISTING_COMMENT_ID})"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --field body=@/tmp/controller_state_comment.md
            echo "📝 Created controller state comment on PR #${PR_NUMBER}"
          fi

      - name: Auto-approve pending workflows on Copilot PRs
        if: >-
          steps.find_pr.outputs.skip != 'true' &&
          steps.check_limit.outputs.exceeded != 'true'
        run: |
          set -euo pipefail

          echo "ℹ️  Auto-approval of workflow runs has been disabled for security reasons."